services:
  mongodb:
    image: mongo:latest
    container_name: cohappy-mongo
    ports:
      - "27017:27017"
    logging:
      driver: "none"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
